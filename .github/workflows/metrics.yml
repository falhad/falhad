name: GitHub Metrics

on:
  # Run every day at 00:00 UTC (04:00 Asia/Muscat)
  schedule:
    - cron: "0 0 * * *"
  # Run on demand from the Actions tab
  workflow_dispatch:
  # Regenerate when the workflow itself changes
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  metrics:
    name: Generate GitHub metrics
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────
      # 1) Profile overview — header, activity, community, repositories,
      #    follow-up ratio, lines of code, recent stars.
      #
      # NOTE: plugin_achievements is intentionally disabled — upstream
      # v3.34 still queries the "Projects (classic)" GraphQL field which
      # GitHub deprecated (2024-05-23), causing the plugin to crash and
      # embed an error message in the SVG. plugin_notable is hoisted to
      # its own card below.
      # ────────────────────────────────────────────────────────────────
      - name: Profile overview
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Muscat
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_stars: yes
          plugin_stars_limit: 4
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 2) Isometric contribution calendar (full year).
      # ────────────────────────────────────────────────────────────────
      - name: Contribution calendar (isometric, full-year)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header
          config_timezone: Asia/Muscat
          # 960px so the isocalendar has room to lay out horizontally.
          config_display: large
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 3) Language breakdown (in-depth) + starred topic icons.
      # ────────────────────────────────────────────────────────────────
      - name: Language breakdown
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header
          config_timezone: Asia/Muscat
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 10
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_analysis_timeout: 15
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 4) Notable contributions — commits, PRs, and issues authored
      #    in other people's repositories. Indepth mode adds per-repo
      #    breakdown.
      # ────────────────────────────────────────────────────────────────
      - name: Notable contributions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/notable.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header
          config_timezone: Asia/Muscat
          plugin_notable: yes
          plugin_notable_repositories: yes
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 5) Stack Overflow — top answers and questions.
      # ────────────────────────────────────────────────────────────────
      - name: Stack Overflow
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/stackoverflow.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header
          config_timezone: Asia/Muscat
          plugin_stackoverflow: yes
          plugin_stackoverflow_user: 3917083
          plugin_stackoverflow_sections: answers-top, questions-top
          plugin_stackoverflow_limit: 4
          plugin_stackoverflow_lines: 2
          plugin_stackoverflow_lines_snippet: yes
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 6) Steam — player summary, most-played, recently-played,
      #    per-game achievements. Requires STEAM_TOKEN repo secret
      #    (https://steamcommunity.com/dev/apikey).
      # ────────────────────────────────────────────────────────────────
      - name: Steam
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: metrics/steam.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header
          config_timezone: Asia/Muscat
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: 76561198133902444
          plugin_steam_sections: player, most-played, recently-played
          plugin_steam_games_limit: 5
          plugin_steam_recent_games_limit: 2
          plugin_steam_playtime_threshold: 2
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # With output_action: none, the metrics Docker container writes
      # the SVGs to /metrics_renders/ (a host-mounted volume owned by
      # root), not into the repo workspace. Copy them in before commit.
      # ────────────────────────────────────────────────────────────────
      - name: Copy generated metrics into workspace
        run: |
          sudo cp -r /metrics_renders/metrics ./
          sudo chown -R "$(id -u):$(id -g)" ./metrics
          ls -la ./metrics

      # ────────────────────────────────────────────────────────────────
      # Commit all generated SVGs in a single commit to keep history clean.
      # ────────────────────────────────────────────────────────────────
      - name: Commit generated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/
          if git diff --staged --quiet; then
            echo "No metrics changes to commit."
          else
            git commit -m "chore(metrics): refresh GitHub profile metrics"
            git pull --rebase
            git push
          fi
