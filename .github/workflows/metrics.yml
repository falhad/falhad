name: GitHub Metrics

on:
  # Run every day at 00:00 UTC (04:00 Asia/Muscat)
  schedule:
    - cron: "0 0 * * *"
  # Run on demand from the Actions tab
  workflow_dispatch:
  # Regenerate when the workflow itself changes
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  metrics:
    name: Generate GitHub metrics
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────
      # 1) Profile overview — header, activity, community, repositories,
      #    follow-up ratio, achievements, lines of code, notable contribs.
      # ────────────────────────────────────────────────────────────────
      - name: Profile overview
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Muscat
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_notable: yes
          plugin_notable_types: commit, pull_request, issue
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 2) Isometric contribution calendar (full year).
      # ────────────────────────────────────────────────────────────────
      - name: Contribution calendar (isometric, full-year)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header
          config_timezone: Asia/Muscat
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 3) Language breakdown (in-depth) + topic icons.
      # ────────────────────────────────────────────────────────────────
      - name: Language breakdown
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header
          config_timezone: Asia/Muscat
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 10
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_analysis_timeout: 15
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 4) Coding habits — time-of-day, weekday, preferred languages.
      # ────────────────────────────────────────────────────────────────
      - name: Coding habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header
          config_timezone: Asia/Muscat
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # Commit all generated SVGs in a single commit to keep history clean.
      # ────────────────────────────────────────────────────────────────
      - name: Commit generated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/
          if git diff --staged --quiet; then
            echo "No metrics changes to commit."
          else
            git commit -m "chore(metrics): refresh GitHub profile metrics"
            git push
          fi
