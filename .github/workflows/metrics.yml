name: GitHub Metrics

on:
  # Run every day at 00:00 UTC (04:00 Asia/Muscat)
  schedule:
    - cron: "0 0 * * *"
  # Run on demand from the Actions tab
  workflow_dispatch:
  # Regenerate when the workflow itself changes
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  contents: write

jobs:
  metrics:
    name: Generate GitHub metrics
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────
      # 1) Profile overview — header, activity, community, repositories.
      # ────────────────────────────────────────────────────────────────
      - name: Profile overview
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Muscat
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 2) Isometric contribution calendar (full year).
      # ────────────────────────────────────────────────────────────────
      - name: Contribution calendar (isometric, full-year)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: ""
          config_timezone: Asia/Muscat
          # 960px so the isocalendar has room to lay out horizontally.
          config_display: large
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # 3) Language breakdown (in-depth) + starred topic icons.
      # ────────────────────────────────────────────────────────────────
      - name: Language breakdown
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: falhad
          template: classic
          base: ""
          config_timezone: Asia/Muscat
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 10
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_analysis_timeout: 15
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          output_action: none

      # ────────────────────────────────────────────────────────────────
      # With output_action: none, the metrics Docker container writes
      # the SVGs to /metrics_renders/ (a host-mounted volume owned by
      # root), not into the repo workspace. Copy them in before commit.
      # ────────────────────────────────────────────────────────────────
      - name: Copy generated metrics into workspace
        run: |
          sudo cp -r /metrics_renders/metrics ./
          sudo chown -R "$(id -u):$(id -g)" ./metrics
          ls -la ./metrics

      # ────────────────────────────────────────────────────────────────
      # Commit all generated SVGs in a single commit to keep history clean.
      # ────────────────────────────────────────────────────────────────
      - name: Commit generated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/
          if git diff --staged --quiet; then
            echo "No metrics changes to commit."
          else
            git commit -m "chore(metrics): refresh GitHub profile metrics"
            git pull --rebase
            git push
          fi
